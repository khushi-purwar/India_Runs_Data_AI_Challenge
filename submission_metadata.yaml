ai_usage_summary: |
  AI coding assistance (GitHub Copilot / Claude) was used for code review,
  documentation, and autocomplete. All scoring logic, the JD interpretation,
  the honeypot heuristics, and the feature design are the team's own
  engineering. No candidate data was sent to any hosted LLM, and the ranker
  makes no network calls at ranking time.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid, fully-offline ranker (~55s for 100K candidates on CPU). The JD is
  hand-translated into a structured signal vocabulary (must-haves, nice-to-haves,
  explicit disqualifiers). Each candidate gets seven interpretable component
  scores — domain evidence (retrieval/ranking/recsys/NLP, weighted toward
  hard-to-fake career prose + TF-IDF semantic match), role-title fit, trusted
  skills, experience band, product-vs-consulting, location, and education —
  combined by weighted sum. Two multipliers then apply: a behavioral
  availability modifier (recency, recruiter response rate, open-to-work) and the
  JD's explicit anti-signals (consulting-only career, CV/speech-only, title
  chasing, academia-only). A honeypot detector hard-zeros impossible profiles
  (tenure exceeding company age, expert skills with zero usage), keeping the
  top-100 honeypot rate at 0%. Reasoning strings are generated only from real
  profile facts, with honest concerns surfaced.

